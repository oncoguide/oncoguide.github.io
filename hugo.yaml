# ============================================
# OncoGuide — Hugo Configuration
# ============================================

baseURL: "https://oncoguide.github.io/"
title: "OncoGuide"
theme: "PaperMod"
paginate: 10
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
enableEmoji: false
enableGitInfo: false  # Enable after first commit

# Multilingual
defaultContentLanguage: "en"
defaultContentLanguageInSubdir: true

# ============================================
# Languages
# ============================================
languages:
  en:
    languageName: "English"
    languageCode: "en"
    weight: 1
    title: "OncoGuide"
    contentDir: "content/en"
    params:
      description: "Practical, evidence-based cancer guidance for patients and families. Free. Always."
      homeInfoParams:
        Title: "Cancer is complex. Your information shouldn't be."
        Content: >
          Whether you were just diagnosed or navigating treatment decisions,
          here you'll find clear, verified guides -- therapies, clinical trials,
          modern protocols, and everything your oncologist may not have time to explain.
    menu:
      main:
        - identifier: diagnosis
          name: "Diagnosis"
          url: /en/diagnosis/
          weight: 10
        - identifier: cancer-types
          name: "Cancer Types"
          url: /en/cancer-types/
          weight: 20
        - identifier: treatment-access
          name: "Treatment Access"
          url: /en/treatment-access/
          weight: 30
        - identifier: imaging
          name: "Imaging Centers"
          url: /en/imaging/
          weight: 40
        - identifier: clinical-trials
          name: "Clinical Trials"
          url: /en/clinical-trials/
          weight: 50
        - identifier: contact
          name: "Contact"
          url: /en/contact/
          weight: 60
        - identifier: search
          name: "Search"
          url: /en/search/
          weight: 70

