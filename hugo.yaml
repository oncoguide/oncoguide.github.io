# ============================================
# OncoGuide — Hugo Configuration
# ============================================

baseURL: "https://oncoguide.github.io/"
title: "OncoGuide"
theme: "PaperMod"
paginate: 10
enableRobotsTXT: false  # use static/robots.txt (includes Disallow: /clinical/)
buildDrafts: false
buildFuture: false
enableEmoji: false
enableGitInfo: false  # Enable after first commit

# Multilingual
defaultContentLanguage: "en"
defaultContentLanguageInSubdir: true

# ============================================
# Languages
# ============================================
languages:
  en:
    languageName: "English"
    languageCode: "en"
    weight: 1
    title: "OncoGuide"
    contentDir: "content/en"
    params:
      description: "AI-curated cancer guides by molecular subtype: diagnosis, targeted therapy, clinical trials, and critical mistakes to avoid. Free patient resource."
      keywords: ["cancer", "artificial intelligence", "AI", "diagnosis", "targeted therapy", "molecular testing", "clinical trials", "patient guide"]
      homeInfoParams:
        Title: "Cancer is complex. Your information shouldn't be."
        Content: >
          Whether you were just diagnosed or navigating treatment decisions,
          here you'll find clear, verified guides -- therapies, clinical trials,
          modern protocols, and everything your oncologist may not have time to explain.
    menu:
      main:
        - identifier: diagnosis
          name: "Diagnosis"
          url: /en/diagnosis/
          weight: 10
        - identifier: cancer-types
          name: "Patient Guides"
          url: /en/cancer-types/
          weight: 20
        - identifier: contact
          name: "Contact"
          url: /en/contact/
          weight: 30
        - identifier: search
          name: "Search"
          url: /en/search/
          weight: 40

  ro:
    languageName: "Română"
    languageCode: "ro"
    weight: 2
    title: "OncoGuide"
    contentDir: "content/ro"
    params:
      description: "Ghiduri de cancer curate cu AI, pe subtip molecular: diagnostic, terapie tintita, trialuri clinice si greseli de evitat. Resursa gratuita pentru pacienti."
      keywords: ["cancer", "inteligenta artificiala", "AI", "diagnostic", "terapie tintita", "teste moleculare", "trialuri clinice", "ghid pacient"]
      homeInfoParams:
        Title: "Cancerul e complex. Informatia ta nu trebuie sa fie."
        Content: >
          Fie ca tocmai ai primit un diagnostic, fie ca esti in tratament si vrei sa fii la curent,
          aici gasesti ghiduri clare si verificate -- terapii, trialuri clinice, protocoale moderne
          si tot ce oncologul tau poate nu are timp sa-ti explice.
    menu:
      main:
        - identifier: diagnosis
          name: "Diagnostic"
          url: /ro/diagnosis/
          weight: 10
        - identifier: cancer-types
          name: "Ghiduri Pacienti"
          url: /ro/cancer-types/
          weight: 20
        - identifier: contact
          name: "Contact"
          url: /ro/contact/
          weight: 30
        - identifier: search
          name: "Cautare"
          url: /ro/search/
          weight: 40

  it:
    languageName: "Italiano"
    languageCode: "it"
    weight: 3
    title: "OncoGuide"
    contentDir: "content/it"
    params:
      description: "Guide oncologiche curate con AI per sottotipo molecolare: diagnosi, terapia mirata, studi clinici e errori da evitare. Risorsa gratuita per pazienti."
      keywords: ["cancro", "intelligenza artificiale", "AI", "diagnosi", "terapia mirata", "test molecolari", "studi clinici", "guida paziente"]
      homeInfoParams:
        Title: "Il cancro e' complesso. Le tue informazioni non devono esserlo."
        Content: >
          Che tu abbia appena ricevuto una diagnosi o stia affrontando decisioni terapeutiche,
          qui trovi guide chiare e verificate -- terapie, studi clinici, protocolli moderni
          e tutto cio' che il tuo oncologo potrebbe non avere tempo di spiegarti.
    menu:
      main:
        - identifier: diagnosis
          name: "Diagnosi"
          url: /it/diagnosis/
          weight: 10
        - identifier: cancer-types
          name: "Guide Pazienti"
          url: /it/cancer-types/
          weight: 20
        - identifier: contact
          name: "Contatto"
          url: /it/contact/
          weight: 30
        - identifier: search
          name: "Cerca"
          url: /it/search/
          weight: 40

  fr:
    languageName: "Français"
    languageCode: "fr"
    weight: 4
    title: "OncoGuide"
    contentDir: "content/fr"
    params:
      description: "Guides cancer cures par IA par sous-type moleculaire : diagnostic, therapie ciblee, essais cliniques et erreurs a eviter. Ressource gratuite pour patients."
      keywords: ["cancer", "intelligence artificielle", "IA", "diagnostic", "therapie ciblee", "tests moleculaires", "essais cliniques", "guide patient"]
      homeInfoParams:
        Title: "Le cancer est complexe. Vos informations ne devraient pas l'etre."
        Content: >
          Que vous veniez de recevoir un diagnostic ou que vous naviguiez entre les options therapeutiques,
          vous trouverez ici des guides clairs et verifies -- therapies, essais cliniques, protocoles modernes
          et tout ce que votre oncologue n'a peut-etre pas le temps de vous expliquer.
    menu:
      main:
        - identifier: diagnosis
          name: "Diagnostic"
          url: /fr/diagnosis/
          weight: 10
        - identifier: cancer-types
          name: "Guides Patients"
          url: /fr/cancer-types/
          weight: 20
        - identifier: contact
          name: "Contact"
          url: /fr/contact/
          weight: 30
        - identifier: search
          name: "Recherche"
          url: /fr/search/
