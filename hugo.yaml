# ============================================
# PaperMod Theme Parameters
# ============================================
params:
  env: production
  author: "OncoGuide"
  displayFullLangName: true
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowRssButtonInSectionTermList: true
  ShowToc: true
  TocOpen: false
  comments: false
  defaultTheme: auto
  disableThemeToggle: false
  disableSpecial1stPost: false
  disableScrollToTop: false
  hideSummary: false
  showtoc: true

  # Homepage info (fallback — per-language versions in languages section above)
  homeInfoParams:
    Title: "Cancer is complex. Your information shouldn't be."
    Content: >
      Whether you were just diagnosed or navigating treatment decisions,
      here you'll find clear, verified guides -- therapies, clinical trials,
      modern protocols, and everything your oncologist may not have time to explain.

  # Social icons — disabled on homepage for clean design
  # socialIcons:
  #   - name: email
  #     url: "mailto:nog.opt.3o@icloud.com"
  #   - name: rss
  #     url: "/index.xml"

  # Search
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  # Footer
  footer:
    hideCopyright: true

  # SEO & meta
  keywords:
    - cancer
    - oncology
    - patient guide
    - diagnosis
    - targeted therapy
    - molecular subtype
    - clinical trials
    - AI
    - artificial intelligence
    - RET fusion
    - lung cancer
    - breast cancer
    - immunotherapy
  label:
    text: "OncoGuide"

# ============================================
# Outputs (JSON needed for search)
# ============================================
outputs:
  home:
    - HTML
    - RSS
    - JSON

# ============================================
# Markup
# ============================================
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

# ============================================
# Minify
# ============================================
minify:
  disableXML: true
  minifyOutput: true

# ============================================
# Privacy (GDPR-friendly, no external services)
# ============================================
privacy:
  disqus:
    disable: true
  googleAnalytics:
    disable: true
  instagram:
    disable: true
  x:
    disable: true
  vimeo:
    disable: true
  youtube:
    privacyEnhanced: true
