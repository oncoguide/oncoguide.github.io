    params:
      description: "KI-kuratierte Krebs-Leitfaeden nach molekularem Subtyp: Diagnose, zielgerichtete Therapie, klinische Studien und Fehler vermeiden. Kostenlose Patientenressource."
      keywords: ["Krebs", "kuenstliche Intelligenz", "KI", "Diagnose", "zielgerichtete Therapie", "molekulare Tests", "klinische Studien", "Patientenleitfaden"]
      homeInfoParams:
        Title: "Krebs ist komplex. Deine Information muss es nicht sein."
        Content: >
          Ob du gerade eine Diagnose erhalten hast oder Behandlungsentscheidungen triffst --
          hier findest du klare, verifizierte Leitfaeden zu Therapien, klinischen Studien, modernen Protokollen
          und allem, wofuer dein Onkologe vielleicht keine Zeit hat.
    menu:
      main:
        - identifier: diagnosis
          name: "Diagnose"
          url: /de/diagnosis/
          weight: 10
        - identifier: cancer-types
          name: "Patientenleitfaden"
          url: /de/cancer-types/
          weight: 20
        - identifier: contact
          name: "Kontakt"
