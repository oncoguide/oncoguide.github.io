  - id: 61
    date: "2026-03-18"
    category: "content"
    summary: "Ghidul generat vs referinta umana: comparatie completa -- puncte forte si lacune identificate"
    context: "Comparat lung-ret-fusion.md generat (174KB, 500 findings) cu ret-fusion-reference-guide.md (74KB, 1684 findings, scris de pacient expert). Ghidul generat are pipeline mai complet (15+ medicamente next-gen, date din 2026, frontier science ANKTIVA/histotripsy/LungVax), date clinice mai detaliate (tabele demografice, mecanisme CYP3A4, date real-world vs trial). Ghidul de referinta e superior pe: resurse comunitate (RETpositive.org, Happy Lungs Project, RET Renegades), viata zilnica practica (exercitiu, nutritie, fertilitate), context Romania/CNAS, ton empatic pacient-centrat, status corect pralsetinib ('retras din UE oct 2024 SI partial din piata US'). CONFLICT CRITIC: referinta spune pralsetinib retras SI din US (partial); ghidul generat a mentionat doar EU withdrawal. Conflict numeric: referinta 59% elevare enzime hepatice (AST), ghidul generat ~40% (ALT) -- enzime diferite sau definitii diferite."
    alternatives_considered:
      - "Publicare ghid generat ca atare -- lipsesc resurse comunitate, context Romania, ghidul e prea clinic"
      - "Publicare referinta ca atare -- lipsesc date pipeline recente, frontier science, date demografice formale"
    outcome: "Decizie: ghidul final pentru articol va combina ambele surse. Ghidul generat = fundatie clinica. Referinta = sectiunile viata zilnica, comunitate, tone, context Romania/EU. ACTIUNE URMATOARE: verifica status US pralsetinib (partial withdrawal claim din referinta)."

  - id: 62
    date: "2026-03-18"
    category: "learning"
    summary: "Comparatie aprofundata: referinta are frontier science mai bun decat ghidul generat -- comparatia initiala a fost gresita"
    context: "Re-citire completa a ambelor fisiere sectiune cu sectiune. Concluzie: referinta (cancer-news-agent, 1684 findings) acopera frontier science MAI BINE decat ghidul generat (500 findings). Ghidul generat omite complet: ANKTIVA (aprobat in 33 tari, Saudi NSCLC jan 2026, EU feb 2026, Phase 3 ResQ201A activ), Vepafestinib (MARGARET trial Phase 1/2, BBB penetration superioara), PROTACs, mRNA vaccines (BNT116, LungVax), CAR-T (CARv3-TEAM-E, celule TCR-RET), MVX-ONCO-1 (Pfizer Prize), bispecifice (Ivonescimab, Amivantamab). Cauza: query-urile discovery phase au fost focusate pe 'RET inhibitor' -- nu au capturat frontier immunotherapy, vaccine platforms, etc. Conflicte numerice identificate: selpercatinib 1st-line PFS 24.8mo (referinta) vs 22.0mo (generat); pralsetinib ORR ~65% (referinta) vs 70% (generat)."
    alternatives_considered:
      - "Publicare ghid generat cu adaugare manuala din referinta -- mai rapid"
      - "Re-rulare pipeline cu query-uri frontier science suplimentare -- cost suplimentar ~$1-2"
    outcome: "Ghidul final trebuie sa integreze datele frontier din referinta: in special ANKTIVA (relevant imediat pentru pacienti UE 2026), Vepafestinib, si celelalte tehnologii. De adaugat manual in ghidul generat, sectiunea 10 (pipeline) si 9 (when treatment stops working)."

  - id: 63
    date: "2026-03-19"
    category: "technical"
    summary: "Token budget fix: smart grouping + tiered formatting solves 400 Bad Request overflow"
    context: "RET Fusion guide generation (3473 findings) had 3 sections fail with 400 Bad Request -- Q2 (1118 findings), Q6 (781), Q3 (532) exceeded 200K context window. Solution: group findings by topic (Haiku AI), format in two tiers (top 15-20 full detail, rest summary-only), safety net in api_call(), retry with halved budget on overflow."
    alternatives_considered:
      - "Truncate findings per section to a fixed cap (e.g., 200) -- loses data"
      - "Compress findings text (shorter summaries) -- loses nuance"
      - "Increase context window / switch model -- not available"
    outcome: "Smart grouping + tiered formatting chosen. Organization not compression. All 16 sections generated, 0 errors, 203KB guide, $0.63 cost, 19m30s. Merged to main as 7 commits, 202 tests."

  - id: 64
    date: "2026-03-19"
    category: "learning"
    summary: "Low-authority frontier tech findings drowned by tiered formatting in large sections"
    context: "Comparison of generated guide vs human reference guide revealed systematic gap: histotripsy (4 findings, auth 2), PCCT (13, auth 2), LungVax (12, auth 2), ANKTIVA (22, auth 2-3) all exist in DB but were placed in Tier 2 summary-only in sections with 500-780 findings. Model never saw them in full detail. Authority-first sorting is correct for clinical accuracy but kills frontier tech, patient communities, and practical tips."
    alternatives_considered:
      - "Lower authority threshold for Tier 1 -- risks promoting unreliable sources"
      - "Add keyword whitelist for frontier tech -- fragile, topic-dependent"
    outcome: "Identified fix: topic-diverse Tier 1 -- guarantee at least 1 finding per topic group in full detail. Not yet implemented. Tracked as pipeline quality improvement."

  - id: 65
    date: "2026-03-19"
    category: "learning"
    summary: "FDA label structured data not captured by pipeline searches"
    context: "Reference guide had exact adverse event frequencies (AST 59%, hyperglycemia 53%), dosing specifics (200ml water, 7-day surgery hold), Xgeva protocol (vitamin D 400IU, calcium 600mg, 2h timing). None of these were in the 3473 findings DB. They come from FDA structured product labels (DailyMed) which the pipeline does not parse."
    alternatives_considered:
      - "Add more search queries targeting FDA labels -- unreliable, may not capture structured tables"
      - "Manual addition per topic -- not scalable"
    outcome: "Identified fix: FDA label auto-extraction in Phase 0 (zero AI cost, structured data, authority 5). Not yet implemented."

  - id: 66
    date: "2026-03-19"
    category: "learning"
    summary: "Human reference guide's unique value is cross-domain clinical reasoning"
    context: "The insight 'hyperglycemia -> gastroparesis -> impaired selpercatinib absorption' does not exist in any single finding. It requires connecting: (1) 53% hyperglycemia prevalence, (2) medical knowledge that hyperglycemia causes gastroparesis, (3) drug fact that selpercatinib is pH-dependent. This multi-hop reasoning is what makes the human guide superior for practical patient advice."
    alternatives_considered:
      - "Use reference guide as input for all topics -- only works when reference exists"
      - "Add more sections to template -- doesn't solve reasoning gap"
    outcome: "Identified fix: mini-discovery in data-first mode -- 1 Sonnet call with top 50 findings to generate cross-domain insights before guide generation. Cost ~$0.05. Not yet implemented."

