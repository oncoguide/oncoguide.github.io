  - id: 54
    date: "2026-03-16"
    category: "learning"
    summary: "oncologist_respond returneaza text narativ pur -- _parse_json fallback cu find('{') NU e suficient"
    context: "Benchmark 14.7 log: oncologist_respond JSON parse failed 5/5 runde. Sonnet raspunde la intrebarile advocate-ului cu text narativ lung, NU cu JSON structurat. Nici instructiunea 'CRITICAL: respond only JSON' nu a functionat. Fallback-ul care gaseste primul { nu ajuta daca textul nu contine deloc structura JSON valida, sau contine {} in contexte non-JSON."
    alternatives_considered:
      - "Instructiuni mai puternice in system prompt -- deja maxim, tot nu functioneaza"
      - "Retry cu mesaj diferit -- costa dublu, nu garanteaza succes"
      - "Renuntare la JSON ptr oncologist_respond, parse text liber -- pierde structura"
    outcome: "BUG CRITIC NEREPARAT. Propuneri de fix: (1) Forteaza raspunsul structurat prin furnizarea unui JSON template in user message cu campuri goale de completat, (2) Daca Sonnet returneaza narativ, extrage raspunsurile cu un Haiku call rapid care structureaza textul in JSON (cost: ~$0.002), (3) Schimba abordarea: oncologist_respond sa nu ceara JSON ci sa ceara text structurat cu delimitatori clari (### Question 1: ...) si parseaza manual. Optiunea 2 (Haiku structurator) e cea mai robusta -- Haiku urmeaza instructiuni JSON mult mai bine decat Sonnet. REZOLVAT in Plan 1 (2026-03-17): toate cele 8 module AI folosesc acum tool_choice=forced -- JSON parsing eliminat complet."

  - id: 56
    date: "2026-03-17"
    category: "learning"
    summary: "APIConnectionError la 60s = ISP/router idle TCP timeout, nu SDK timeout -- fix: streaming"
    context: "Benchmark dry-run esua dupa exact 60s cu 'Server disconnected without sending a response'. SDK-ul retria de 2 ori (2x60s = 3 minute pierdute). Cauza: Sonnet cu prompt mare (pre-search context + skill file) ia >60s pana la primul token. Router/ISP taie conexiunile TCP idle la 60s."
    alternatives_considered:
      - "httpx timeout mai mare -- nu ajuta, problema e la nivel TCP la ISP, nu la SDK"
      - "Retry in cod -- SDK deja retry de 2 ori, tot esueaza"
    outcome: "Fix: inlocuit client.messages.create() cu client.messages.stream() via get_final_message() in utils.api_call(). Streaming trimite un HTTP 200 + header imediat, pastrand conexiunea vie chiar daca tokenurile vin mai tarziu. Aplicat in discovery.py (3 calls), keyword_extractor.py (1), validation.py (2), guide_generator.py (2). 116 teste trec."

  - id: 57
    date: "2026-03-17"
    category: "learning"
    summary: "_oncologist_respond returna answers:[] la fiecare runda -- cauza: max_tokens=8000 insuficient"
    context: "Dry-run 1 (post streaming fix): WARNING 'oncologist response empty' in toate 5 rundele. Discovery nu converge. Diagnosticare: 7 intrebari medicale complexe, fiecare raspuns ~500-1000 tokens = 3500-7000 tokens + additional_knowledge. Sonnet genereaza ~8000 tokens si se taie exact la limita. JSON truncat = answers:[]. Confirmat: round 1 respond call dureaza 3 minute (8000 tokens la ~50 tok/s). HTTP 200 OK vine imediat dar WARNING apare 3 minute mai tarziu."
    alternatives_considered:
      - "max_tokens=8000 -- truncheaza JSON, answers empty"
      - "Reduce numarul de intrebari -- limiteaza calitatea discovery"
    outcome: "Fix: max_tokens 8000 -> 16000 in _oncologist_respond (discovery.py). Adaugat log INFO cu stop_reason si output_tokens. Dry-run 2 (post fix): 0 warnings, discovery CONVERGE dupa 3 runde (vs. 5 runde non-converged), 122 queries extrase, cost $1.09 pt. faze 0-2. Benchmark real gata de rulat."

