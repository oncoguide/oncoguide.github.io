    outcome: "Ghidul NU poate fi publicat pana cand cele 5 safety concerns nu sunt corectate. Validarea automata functioneaza: a prins erori reale post-cutoff (pralsetinib EU withdrawal) si erori de continut (sfat inversat, interactiuni gresite). Benchmark a aratat si 2 bug-uri in pipeline: guide_generator KeyError 'description' (sectional planner nu returna description field), si _oncologist_respond overflow max_tokens din cauza pre_search_context in system prompt. Ambele fixate."

  - id: 59
    date: "2026-03-17"
    category: "learning"
    summary: "guide_generator.py: KeyError 'description' -- section planner nu returna description field"
    context: "Phase 6 esua cu 'Generation failed: description' pentru toate 15 sectiunile. Ghidul generat era 1.3KB. Cauza: SECTION_PLAN_TOOL schema nu include 'description' in output (doar id, title, finding_ids, priority_claims). Dar _generate_section() accesa section['description'] direct. La runtime: planner returna dict fara 'description' -> KeyError -> toate sectiunile esuau."
    alternatives_considered:
      - "Adauga description in SECTION_PLAN_TOOL schema -- forteaza modelul sa regenereze informatia deja definita in GUIDE_SECTIONS"
      - "Fallback section.get('description', '') -- sectiunea ar fi generata fara scope, calitate slaba"
    outcome: "Fix: in _generate_section(), lookup description din GUIDE_SECTIONS by section id daca lipseste din planner output. 116 teste trec. Ghid generat: 169KB."

  - id: 60
    date: "2026-03-17"
    category: "learning"
    summary: "_oncologist_respond overflow max_tokens: pre_search_context in system prompt era de vina"
    context: "Benchmark real: rounds 1+2 hitting stop_reason=max_tokens exact la 16000 tokens. Cauza: system prompt includea pre_search_context (106 findings formatate, ~10000 tokens) + skill file + instructiuni. Ramas putin spatiu pentru 6 raspunsuri detaliate + additional_knowledge JSON. Dry-run anterior nu manifesta problema: probabil pre_search_context mai mic. Oncologul nu are nevoie de raw pre_search data in respond call -- deja are knowledge_text care integreaza informatia."
    alternatives_considered:
      - "max_tokens 16000 -> 32000+ -- ar depasi costul si latenta, cauza ramane"
      - "Reduce numarul de intrebari la 3 -- limiteaza calitatea discovery"
