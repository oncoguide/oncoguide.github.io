  - id: 26
    date: "2026-03-14"
    category: "content"
    summary: "Mission message: personal story + AI, no job title, no repetition with subtitle"
    context: "Iterated through multiple versions of the homepage mission block. 'IT engineer' angle felt weak and unnecessary. The powerful insight is: oncology info changes faster than any human can track, AI bridges the gap. Message must not repeat what the subtitle already says (therapies, trials, protocols)."
