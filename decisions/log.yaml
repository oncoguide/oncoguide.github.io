      - "Show all section cards including empty ones -- gives 'coming soon' feel"
    outcome: "Hero: personal voice ('You just got a diagnosis. Now what?'). Featured article card for latest guide. Section cards only for sections with published articles. Mission block: IT engineer + AI tools angle. Footer: only Contact link. About removed from header and footer menus. Must work on both mobile and desktop."

